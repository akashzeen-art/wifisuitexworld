spring.application.name=wifi-extender

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/wifi_extender
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA — let Hibernate create schema ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── Flyway — DISABLED ─────────────────────────────────────────────────────────
spring.flyway.enabled=false

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=wifiextender_super_secret_key_change_in_production_min_256_bits_long
app.jwt.access-expiration=86400000
app.jwt.refresh-expiration=604800000

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8018
server.error.include-message=never
server.error.include-stacktrace=never

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:5174,http://192.168.1.31:5173,http://192.168.1.31:5174,http://192.168.1.31:8080

# ── WebSocket ─────────────────────────────────────────────────────────────────
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# ── Payment Gateways ─────────────────────────────────────────────────────────
# Stripe
app.payment.stripe.secret-key=sk_test_REPLACE_WITH_YOUR_STRIPE_SECRET_KEY
app.payment.stripe.webhook-secret=whsec_REPLACE_WITH_YOUR_STRIPE_WEBHOOK_SECRET
app.payment.stripe.publishable-key=pk_test_REPLACE_WITH_YOUR_STRIPE_PUBLISHABLE_KEY

# Razorpay
app.payment.razorpay.key-id=rzp_test_REPLACE_WITH_YOUR_RAZORPAY_KEY_ID
app.payment.razorpay.key-secret=REPLACE_WITH_YOUR_RAZORPAY_KEY_SECRET

# PayPal
app.payment.paypal.client-id=REPLACE_WITH_YOUR_PAYPAL_CLIENT_ID
app.payment.paypal.client-secret=REPLACE_WITH_YOUR_PAYPAL_CLIENT_SECRET
app.payment.paypal.mode=sandbox

# Frontend URL (for redirect after payment)
app.frontend.url=http://localhost:5173

# ── Windows installer (optional explicit path) ────────────────────────────────
# app.download.windows-installer=C:/path/to/WiFiExtender-Setup.exe

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
